desktop:
  resolution:
    width: 1920
    height: 1080
  allow_resize: false
  pixel_depth: 24

network:
  protocol: http
  interface: 0.0.0.0
  websocket_port: 80
  ssl:
    require_ssl: false

user_session:
  idle_timeout: 1800

encoding:
  max_frame_rate: 30
  rect_encoding_mode:
    min_quality: 7
    max_quality: 9
    consider_lossless_quality: 9
  video_encoding_mode:
    webp_encoding_time: 50

logging:
  log_writer_name: all
  log_dest: logfile
  level: 30

command_line:
  prompt: false
